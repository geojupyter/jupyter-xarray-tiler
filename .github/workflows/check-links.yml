name: "Check links"

on:
  push:
    branches: "main"
  pull_request:
    branches: "*"


concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  check_links:
    name: "Check Links"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false

      - uses: "jupyterlab/maintainer-tools/.github/actions/base-setup@f5d710df1483f19b666dd96aeabbe949a53642c2" # v1

      - uses: "jupyterlab/maintainer-tools/.github/actions/check-links@f5d710df1483f19b666dd96aeabbe949a53642c2" # v1
        with:
          # Allow absolute links; any broken links will get caught in the docs build
          ignore_links: >-
            ^/.*
            https://www\.leafmap\.org.*
