name: "Build"

on:
  push:
    branches: "main"
  pull_request:
    branches: "*"


concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: "astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78" # v7

      - name: "Install dependencies"
        run: "uv sync --group dev --group test"

      - name: "Check the server extension is installed"
        run: |
          set -eux
          uv run jupyter server extension list
          uv run jupyter server extension list 2>&1 | grep -ie "jupyter_xarray_tiler.*OK"

      - name: "Test"
        run: "uv run pytest -vv -r ap --cov"

      - name: "Package the extension"
        run: "uv build"

      - name: "Upload extension packages"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4
        with:
          name: "extension-artifacts"
          path: "dist/jupyter_xarray_tiler*"
          if-no-files-found: "error"

  test_isolated:
    needs: "build"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Install Python"
        uses: "actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065" # v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78" # v7

      - uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4
        with:
          name: "extension-artifacts"

      - name: "Install from wheel"
        run: |
          uv pip install --system "jupyterlab>=4.0.0,<5" jupyter_xarray_tiler*.whl

      - name: "Check the server extension is installed"
        run: |
          set -eux
          jupyter server extension list
          jupyter server extension list 2>&1 | grep -ie "jupyter_xarray_tiler.*OK"
